# Read the Docs build configuration for the JAXVacua documentation.
#
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for the full
# reference.  Layout mirrors jaxpolylog: `documentation/` is the build root
# with a `source/` subdirectory and a sibling `requirements.txt`.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: documentation/source/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf

# Install the doc toolchain (documentation/requirements.txt -- which pins
# `platformdirs` ahead of the cytools install) and then jaxvacua itself, so
# autodoc can import the package and its runtime deps (cytools, gurobipy,
# python-flint, jaxpolylog) -- all available on PyPI.
python:
  install:
    - requirements: documentation/requirements.txt
    - method: pip
      path: .