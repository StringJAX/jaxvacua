# Read the Docs build configuration for the JAXVacua documentation.
#
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for the full
# reference.  Layout mirrors jaxpolylog: `documentation/` is the build root
# with a `source/` subdirectory and a sibling `requirements.txt`.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: documentation/source/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf

# Install only the documentation toolchain.  Unlike jaxpolylog we do NOT
# `pip install .` here: jaxvacua's runtime dependencies (cytools, gurobipy,
# python-flint) are not installable on Read the Docs and would hard-fail the
# build.  `documentation/source/conf.py` instead prepends the repo root to
# `sys.path` so jaxvacua is importable from source for autodoc; the version is
# read from `jaxvacua/__init__.py` without importing the package.
python:
  install:
    - requirements: documentation/requirements.txt