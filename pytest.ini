[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers — see workflows/stringjax/jaxvacua_ci.md for the maintenance procedure.
markers =
    slow: tests with runtime above the slow threshold (deselect with '-m "not slow"'). Driven by scripts/classify_tests.py.
    requires_cytools: tests that import cytools or trigger cytools-dependent code paths.
    requires_gurobi: tests that call Gurobi-backed routines (gurobipy free tier may not suffice for large models).

# Shorter traceback by default
# Note: run with JAX_ENABLE_X64=1 (set in conftest.py or shell env)
addopts = --tb=short -q

# Filter common warnings
filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::UserWarning:jaxvacua.flux_eft
