[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers — see workflows/stringforge/jaxvacua_ci.md for the maintenance procedure.
markers =
    slow: tests with runtime above the slow threshold (deselect with '-m "not slow"'). Driven by scripts/classify_tests.py.
    requires_cytools: tests that import cytools or trigger cytools-dependent code paths.
    requires_gurobi: tests that call Gurobi-backed routines (gurobipy free tier may not suffice for large models).

# Shorter traceback by default
# Note: run with JAX_ENABLE_X64=1 (set in conftest.py or shell env)
addopts = --tb=short -q

# Filter common warnings (all upstream / third-party noise we cannot fix here).
filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::UserWarning:jaxvacua.flux_eft
    # osqp 0.6.x changes default of `raise_error` in a future release.
    ignore::PendingDeprecationWarning:osqp
    # Python 3.12 warns when os.fork() is called after threads exist.  No
    # jaxvacua code forks directly (verified by grep); the warning fires
    # from a transitive dep (e.g. cytools / joblib).  Tests do not actually
    # deadlock, so silence the noise.
    ignore::RuntimeWarning:multiprocessing.popen_fork
    # chex still uses `np.result_type(array)` instead of `array.dtype`;
    # triggered ~108 times across test_flux_eft.  Fixed upstream but not
    # yet released.
    ignore::DeprecationWarning:chex._src.asserts
