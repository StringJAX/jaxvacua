[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Shorter traceback by default
# Note: run with JAX_ENABLE_X64=1 (set in conftest.py or shell env)
addopts = --tb=short -q

# Filter common warnings
filterwarnings =
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::UserWarning:jaxvacua.flux_eft
