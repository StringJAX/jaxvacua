name: CI

# See workflows/stringjax/jaxvacua_ci.md for rationale behind this split.
#
#  * fast — runs on every push/PR. pytest -m "not slow".
#    All deps installed (cytools is required at import time); targets
#    a few minutes of GHA wall time.  Includes tests/test_coniLCS_limit.py
#    (the NB13-fingerprint coniLCS regression net) — those tests have no
#    `slow` marker and are picked up by `pytest -m "not slow"`.
#  * full — weekly cron + manual dispatch only. Runs everything
#    including the 97 __with_jit tests. Multi-hour on GHA runners.
#    Also includes test_coniLCS_limit.py.
#
# jaxpolylog version exclusion
# ----------------------------
# The conifold dilog uses jax_polylog_vmap(..., approx="patch") for
# limit="coniLCS". jaxpolylog 0.2.0 changed the "patch" output enough to
# break the coniLCS convergence basin; all earlier and later versions are
# fine.  Pin via "!=0.2.0" rather than an upper bound — a fixed 0.2.x is
# expected upstream soon. Drop the exclusion once test_coniLCS_limit.py
# passes against the new release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 0"   # Sunday 04:00 UTC (weekly)
  workflow_dispatch:

# Single source of truth for the jaxpolylog spec.
env:
  JAXPOLYLOG_PIN: "jaxpolylog>=0.1.0,!=0.2.0"

jobs:
  fast:
    name: Fast (pytest -m 'not slow')
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache JAX compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/jax
          key: ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-fast-${{ hashFiles('jaxvacua/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-fast-

      - name: Install jaxvacua + deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest chex "${{ env.JAXPOLYLOG_PIN }}"
          # platformdirs is a transitive dep of cytools not declared by the
          # cytools PyPI wheel; install explicitly to avoid ModuleNotFoundError.
          pip install platformdirs
          # cytools is required at jaxvacua import time (see
          # jaxvacua/__init__.py — eager `from .cytools_interface import *`).
          pip install -e .

      - name: Run fast test suite
        env:
          JAX_ENABLE_X64: "1"
        run: pytest tests/ -v -m "not slow"

  docs-smoke:
    name: Docs smoke (sphinx-build)
    # Catches broken toctree entries, dangling cross-refs, stale notebook
    # paths after the 2026-05 tutorial refactor. Does NOT execute notebooks
    # (too slow on GHA — execution is a separate concern).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r documentation/requirements.txt
          pip install "${{ env.JAXPOLYLOG_PIN }}"
          pip install platformdirs
          pip install -e .

      - name: Build HTML (warnings allowed)
        run: |
          sphinx-build -b html -E -q -j 1 --keep-going \
            -d /tmp/sphinx-doctree \
            documentation/source /tmp/sphinx-out

  full:
    name: Full (pytest tests/)
    # Weekly cron + manual dispatch only. Not on push/PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache JAX compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/jax
          key: ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-full-${{ hashFiles('jaxvacua/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-full-

      - name: Install jaxvacua + all heavy deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest chex "${{ env.JAXPOLYLOG_PIN }}"
          pip install platformdirs
          pip install -e .

      - name: Run full test suite
        env:
          JAX_ENABLE_X64: "1"
        run: pytest tests/ -v