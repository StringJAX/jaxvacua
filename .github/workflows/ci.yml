name: CI

# See workflows/stringjax/jaxvacua_ci.md for rationale behind this split.
#
#  * fast — runs on every push/PR. pytest -m "not slow".
#    All deps installed (cytools is required at import time); targets
#    a few minutes of GHA wall time.  Includes tests/test_coniLCS_limit.py
#    (the NB13-fingerprint coniLCS regression net) — those tests have no
#    `slow` marker and are picked up by `pytest -m "not slow"`.
#  * test-sharded — full-coverage suite, split into a matrix of shards via
#    pytest-split across python-version x shard-id.  Each shard finishes well
#    under GitHub's 6h per-job cap while the matrix collectively covers the
#    whole suite.  This REPLACES the old serial `full` job, which ran the
#    entire suite on a single runner and routinely hit the 6h cap and was
#    cancelled.
#
# jaxpolylog version exclusion
# ----------------------------
# The conifold dilog uses jax_polylog_vmap(..., approx="patch") for
# limit="coniLCS". jaxpolylog 0.2.0 changed the "patch" output enough to
# break the coniLCS convergence basin; all earlier and later versions are
# fine.  Pin via "!=0.2.0" rather than an upper bound — a fixed 0.2.x is
# expected upstream soon. Drop the exclusion once test_coniLCS_limit.py
# passes against the new release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 0"   # Sunday 04:00 UTC (weekly)
  workflow_dispatch:

# Single source of truth for the jaxpolylog spec.
env:
  JAXPOLYLOG_PIN: "jaxpolylog>=0.1.0,!=0.2.0"

# Cancel any in-flight runs on the same ref when a new commit lands.
# Without this, every push spawns 19 jobs (fast=2 + docs=1 +
# test-sharded=16) on top of the previous push's still-running ones,
# quickly overflowing GitHub's ~20-concurrent-Ubuntu-job free-tier cap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast (pytest -m 'not slow')
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache JAX compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/jax
          key: ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-fast-${{ hashFiles('jaxvacua/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-fast-

      - name: Install jaxvacua + deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest chex "${{ env.JAXPOLYLOG_PIN }}"
          # platformdirs is a transitive dep of cytools not declared by the
          # cytools PyPI wheel; install explicitly to avoid ModuleNotFoundError.
          pip install platformdirs
          # cytools is required at jaxvacua import time (see
          # jaxvacua/__init__.py — eager `from .cytools_interface import *`).
          pip install -e .

      - name: Run fast test suite
        env:
          JAX_ENABLE_X64: "1"
        run: pytest tests/ -v -m "not slow"

  docs-smoke:
    name: Docs smoke (sphinx-build)
    # Catches broken toctree entries, dangling cross-refs, stale notebook
    # paths after the 2026-05 tutorial refactor. Does NOT execute notebooks
    # (too slow on GHA — execution is a separate concern).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r documentation/requirements.txt
          pip install "${{ env.JAXPOLYLOG_PIN }}"
          pip install platformdirs
          pip install -e .

      - name: Build HTML (warnings allowed)
        run: |
          sphinx-build -b html -E -q -j 1 --keep-going \
            -d /tmp/sphinx-doctree \
            documentation/source /tmp/sphinx-out

  test-sharded:
    name: Test sharded (py${{ matrix.python-version }}, shard ${{ matrix.shard }}/8)
    # Full-coverage suite split into N parallel shards via pytest-split.
    # Runs on every push/PR + weekly cron + manual dispatch.
    #
    # Shard count: 8.  Bumped from 4 after one shard hit the 6h GHA cap due
    # to pytest-split's default *count-based* balancing (JIT-heavy tests
    # clustered unevenly).  For durably-balanced shards, generate
    # `.test_durations` once locally via
    #     pytest --store-durations
    # and commit it — pytest-split then uses real timings.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache JAX compilation cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/jax
          key: ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-sharded-s${{ matrix.shard }}-${{ hashFiles('jaxvacua/**/*.py', 'tests/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-jaxcache-sharded-s${{ matrix.shard }}-

      - name: Install jaxvacua + deps + pytest-split
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-split chex "${{ env.JAXPOLYLOG_PIN }}"
          pip install platformdirs
          pip install -e .

      - name: Run shard ${{ matrix.shard }}/8
        env:
          JAX_ENABLE_X64: "1"
          # Unbuffered stdio so live progress reaches the GHA log without
          # waiting for the Python 4-8 KB stdio buffer to fill.  Remove
          # together with ``-s`` once the css hang is diagnosed.
          PYTHONUNBUFFERED: "1"
        run: pytest tests/ -v -s --splits=8 --group=${{ matrix.shard }}