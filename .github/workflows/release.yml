name: release

# Build and publish jaxvacua to PyPI on a version tag, using PyPI Trusted
# Publishing (OIDC) -- no API tokens are stored.  Configure the trusted
# publisher on PyPI for this repository and the `pypi` environment before the
# first release.
#
# Release flow:
#   1. bump the version in jaxvacua/__init__.py AND setup.py (keep them in sync)
#   2. commit + push to main
#   3. git tag -a vX.Y.Z -m "jaxvacua X.Y.Z" && git push origin vX.Y.Z
#      -> this workflow builds the sdist+wheel and publishes them.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: if this version was already uploaded (e.g. manually via
          # twine), skip it instead of failing.  Lets a tag push coexist with a
          # manual release without a red workflow run.
          skip-existing: true
