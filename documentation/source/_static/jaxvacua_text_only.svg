<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="600" height="160">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <filter id="textGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <text x="10" y="48" font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif" font-size="54" letter-spacing="-1.5" filter="url(#textGlow)">
    <tspan font-weight="700" fill="url(#textGrad)">JAX</tspan><tspan font-weight="300" fill="#475569">Vacua</tspan>
  </text>
  <text x="12" y="65" font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif" font-size="9" fill="#64748b" letter-spacing="5.8" opacity="0.6">STRING VACUA WITH JAX</text>
  <line x1="10" y1="72" x2="280" y2="72" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
</svg>